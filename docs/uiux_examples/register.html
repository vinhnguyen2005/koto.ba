<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koto.ba — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--lime:#7AB800;--lime-bright:#8FD400;--lime-light:#C8E63A;--lime-pale:#EEF7C2;--lime-dim:rgba(122,184,0,0.10);--green-dark:#2D5016;--charcoal:#1A1F0E;--bg:#F2F5E8;--surface:#FFFFFF;--surface2:#F7FAF0;--text:#1A1F0E;--text2:#4A5428;--muted:#8A9468;--border:rgba(122,184,0,0.22);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-y:auto;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(122,184,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(122,184,0,0.05) 1px,transparent 1px);background-size:40px 40px;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb1{width:350px;height:350px;background:rgba(200,230,58,0.22);top:-80px;left:-80px;}
.orb2{width:250px;height:250px;background:rgba(122,184,0,0.15);bottom:0;right:0;}

.page-wrap{position:relative;z-index:1;width:100%;max-width:560px;padding:20px;}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:14px;margin-bottom:24px;transition:color 0.2s;}
.back-link:hover{color:var(--lime);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 48px;box-shadow:0 24px 64px rgba(45,80,22,0.12);}
.brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.brand-icon{width:40px;height:40px;background:var(--lime);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text);}
.brand-name span{color:var(--muted);}
.form-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--text);margin-bottom:6px;}
.form-subtitle{font-size:14px;color:var(--muted);margin-bottom:32px;}
.form-subtitle a{color:var(--lime);text-decoration:none;font-weight:500;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all 0.25s;}
.form-input::placeholder{color:#BCC4A0;}
.form-input:focus{border-color:var(--lime);background:#fff;box-shadow:0 0 0 3px rgba(122,184,0,0.12);}
.strength-bar{display:flex;gap:4px;margin-top:6px;}
.strength-seg{height:3px;flex:1;border-radius:2px;background:rgba(122,184,0,0.12);transition:background 0.3s;}
.strength-seg.active{background:var(--lime);}
.password-hint{font-size:11px;color:var(--muted);margin-top:5px;}
.avatar-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.avatar-picker{display:flex;gap:10px;margin-bottom:20px;}
.avatar-opt{width:46px;height:46px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface2);}
.avatar-opt:hover,.avatar-opt.selected{border-color:var(--lime);background:var(--lime-pale);transform:scale(1.1);}
.terms-check{display:flex;align-items:flex-start;gap:10px;margin-bottom:22px;font-size:13px;color:var(--muted);}
.terms-check input{margin-top:2px;accent-color:var(--lime);flex-shrink:0;}
.terms-check a{color:var(--lime);text-decoration:none;}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--lime) 0%,var(--lime-bright) 100%);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 16px rgba(122,184,0,0.28);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(122,184,0,0.38);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="page-wrap">
  <a href="index.html" class="back-link">← Back to login</a>
  <div class="card">
    <div class="brand-logo">
      <div class="brand-icon">K</div>
      <div class="brand-name">koto<span>.ba</span></div>
    </div>
    <div class="form-title">Create your account</div>
    <div class="form-subtitle">Already have one? <a href="index.html">Sign in</a></div>
    <div class="avatar-label">Choose your avatar</div>
    <div class="avatar-picker">
      <div class="avatar-opt selected" onclick="selectAvatar(this)">🍋</div>
      <div class="avatar-opt" onclick="selectAvatar(this)">🥝</div>
      <div class="avatar-opt" onclick="selectAvatar(this)">🌿</div>
      <div class="avatar-opt" onclick="selectAvatar(this)">🦎</div>
      <div class="avatar-opt" onclick="selectAvatar(this)">🌱</div>
    </div>
    <form onsubmit="return false;">
      <div class="form-row-2">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" placeholder="Minh"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" placeholder="Nguyen"></div>
      </div>
      <div class="form-group"><label class="form-label">Username</label><input type="text" class="form-input" placeholder="@minhnguyen" oninput="if(!this.value.startsWith('@'))this.value='@'+this.value.replace('@','')"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="you@koto.ba"></div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Min. 8 characters" oninput="checkStrength(this)">
        <div class="strength-bar"><div class="strength-seg" id="s1"></div><div class="strength-seg" id="s2"></div><div class="strength-seg" id="s3"></div><div class="strength-seg" id="s4"></div></div>
        <div class="password-hint">Use letters, numbers and symbols</div>
      </div>
      <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-input" placeholder="Re-enter password"></div>
      <div class="terms-check"><input type="checkbox" id="terms" checked><label for="terms">I agree to koto.ba's <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label></div>
      <button class="btn-primary" onclick="window.location.href='chat.html'">Create Account →</button>
    </form>
  </div>
</div>
<script>
function selectAvatar(el){document.querySelectorAll('.avatar-opt').forEach(a=>a.classList.remove('selected'));el.classList.add('selected');}
function checkStrength(input){const v=input.value;let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;[1,2,3,4].forEach(i=>{document.getElementById('s'+i).classList.toggle('active',i<=s);});}
</script>
</body>
</html>
