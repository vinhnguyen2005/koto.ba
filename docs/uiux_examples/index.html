<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koto.ba — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --lime: #7AB800; --lime-bright: #8FD400; --lime-light: #C8E63A;
  --lime-pale: #EEF7C2; --lime-dim: rgba(122,184,0,0.10);
  --green-dark: #2D5016; --charcoal: #1A1F0E;
  --bg: #F2F5E8; --surface: #FFFFFF; --surface2: #F7FAF0;
  --text: #1A1F0E; --text2: #4A5428; --muted: #8A9468;
  --border: rgba(122,184,0,0.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-y:auto;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(122,184,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(122,184,0,0.05) 1px,transparent 1px);background-size:40px 40px;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb1{width:400px;height:400px;background:rgba(200,230,58,0.28);top:-120px;right:-80px;}
.orb2{width:300px;height:300px;background:rgba(122,184,0,0.15);bottom:-60px;left:-60px;}
.lemon-deco{position:fixed;pointer-events:none;z-index:0;opacity:0.07;}
.lemon-deco.tl{top:-60px;left:-60px;}
.lemon-deco.br{bottom:-60px;right:-60px;transform:rotate(45deg);}

.container{position:relative;z-index:1;display:flex;width:100%;max-width:1020px;min-height:580px;border-radius:28px;overflow:hidden;box-shadow:0 24px 80px rgba(45,80,22,0.18),0 0 0 1px rgba(122,184,0,0.15);margin:20px;}@media(max-width:640px){.container{flex-direction:column;margin:0;border-radius:0;min-height:100vh;}}

.panel-left{flex:1;background:linear-gradient(145deg,#2D5016 0%,#3D6B1A 50%,#4A7C1F 100%);padding:60px 50px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.panel-left::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 35%,rgba(200,230,58,0.18) 0%,transparent 65%);}
.brand{position:relative;z-index:1;}
.brand-logo{display:flex;align-items:center;gap:12px;margin-bottom:44px;}
.brand-icon{width:48px;height:48px;background:var(--lime-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#1A1F0E;flex-shrink:0;box-shadow:0 4px 16px rgba(200,230,58,0.35);}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--lime-light);letter-spacing:-0.5px;}
.brand-name span{color:rgba(200,230,58,0.4);}
.tagline{font-family:'Syne',sans-serif;font-weight:300;font-size:40px;color:#fff;line-height:1.15;letter-spacing:-1.5px;}
.tagline strong{color:var(--lime-light);font-weight:800;display:block;}
.lemon-art{position:absolute;right:-30px;top:50%;transform:translateY(-50%);z-index:0;opacity:0.12;}
.features{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;}
.feature-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:14px;transition:all 0.3s;}
.feature-item:hover{background:rgba(255,255,255,0.12);transform:translateX(4px);}
.feature-dot{width:8px;height:8px;background:var(--lime-light);border-radius:50%;flex-shrink:0;box-shadow:0 0 8px rgba(200,230,58,0.7);}
.feature-text{color:rgba(255,255,255,0.8);font-size:14px;}

.panel-right{width:420px;background:var(--surface);padding:60px 50px;display:flex;flex-direction:column;justify-content:center;}
.form-header{margin-bottom:38px;}
.form-title{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px;}
.form-subtitle{font-size:14px;color:var(--muted);}
.form-subtitle a{color:var(--lime);text-decoration:none;font-weight:500;}
.form-subtitle a:hover{text-decoration:underline;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;}
.form-input{width:100%;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all 0.25s;}
.form-input::placeholder{color:#BCC4A0;}
.form-input:focus{border-color:var(--lime);background:#fff;box-shadow:0 0 0 3px rgba(122,184,0,0.12);}
.form-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.checkbox-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;}
.checkbox-label input{accent-color:var(--lime);width:15px;height:15px;}
.forgot-link{font-size:13px;color:var(--lime);text-decoration:none;font-weight:500;}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--lime) 0%,var(--lime-bright) 100%);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 16px rgba(122,184,0,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(122,184,0,0.4);}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--muted);}
.social-btns{display:flex;gap:10px;}
.btn-social{flex:1;padding:11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn-social:hover{background:var(--lime-pale);border-color:var(--lime);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="lemon-deco tl"><svg width="280" height="280" viewBox="0 0 280 280" fill="none"><circle cx="140" cy="140" r="130" stroke="#7AB800" stroke-width="3"/><circle cx="140" cy="140" r="90" stroke="#7AB800" stroke-width="2"/><line x1="140" y1="10" x2="140" y2="270" stroke="#7AB800" stroke-width="2"/><line x1="10" y1="140" x2="270" y2="140" stroke="#7AB800" stroke-width="2"/><line x1="47" y1="47" x2="233" y2="233" stroke="#7AB800" stroke-width="1.5"/><line x1="233" y1="47" x2="47" y2="233" stroke="#7AB800" stroke-width="1.5"/></svg></div>
<div class="lemon-deco br"><svg width="240" height="240" viewBox="0 0 240 240" fill="none"><circle cx="120" cy="120" r="110" stroke="#7AB800" stroke-width="3"/><circle cx="120" cy="120" r="75" stroke="#7AB800" stroke-width="2"/><line x1="120" y1="10" x2="120" y2="230" stroke="#7AB800" stroke-width="2"/><line x1="10" y1="120" x2="230" y2="120" stroke="#7AB800" stroke-width="2"/></svg></div>

<div class="container">
  <div class="panel-left">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">K</div>
        <div class="brand-name">koto<span>.ba</span></div>
      </div>
      <div class="tagline">Chat that's<strong>fresh &amp; effortless.</strong></div>
    </div>
    <svg class="lemon-art" width="180" height="280" viewBox="0 0 180 280" fill="none"><ellipse cx="90" cy="140" rx="82" ry="122" stroke="#C8E63A" stroke-width="3"/><line x1="90" y1="18" x2="90" y2="262" stroke="#C8E63A" stroke-width="2"/><line x1="8" y1="140" x2="172" y2="140" stroke="#C8E63A" stroke-width="2"/><line x1="32" y1="50" x2="148" y2="230" stroke="#C8E63A" stroke-width="1.5"/><line x1="148" y1="50" x2="32" y2="230" stroke="#C8E63A" stroke-width="1.5"/><ellipse cx="90" cy="140" rx="50" ry="74" stroke="#C8E63A" stroke-width="1.5"/></svg>
    <div class="features">
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">Copy Messenger — replicate any style</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">Stories that disappear in 24h</div></div>
      <div class="feature-item"><div class="feature-dot"></div><div class="feature-text">End-to-end encrypted messaging</div></div>
    </div>
  </div>
  <div class="panel-right">
    <div class="form-header">
      <div class="form-title">Welcome back 👋</div>
      <div class="form-subtitle">Don't have an account? <a href="register.html">Sign up free</a></div>
    </div>
    <form onsubmit="return false;">
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="you@koto.ba"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="••••••••"></div>
      <div class="form-row">
        <label class="checkbox-label"><input type="checkbox" checked> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button class="btn-primary" onclick="window.location.href='chat.html'">Sign In →</button>
    </form>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">or continue with</div><div class="divider-line"></div></div>
    <div class="social-btns">
      <button class="btn-social"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
      <button class="btn-social"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Facebook</button>
    </div>
  </div>
</div>
</body>
</html>
